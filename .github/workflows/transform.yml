name: Transform

on: [push, pull_request]

jobs:
  transform:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x install.sh convert.sh
      - run: ./install.sh
      - run: ./convert.sh
      - uses: actions/upload-artifact@v4
        with:
          name: transformed.nt
          path: output/transformed.nt
